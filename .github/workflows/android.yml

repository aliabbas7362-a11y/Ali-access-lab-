name: Build Signed APK

on:
  push:
    branches:
      - setup-signed-apk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug workspace (IMPORTANT)
        run: |
          pwd
          ls -la
          find . -name gradlew -type f

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Make gradlew executable (SAFE)
        run: |
          GRADLEW_PATH=$(find . -name gradlew -type f | head -n 1)

          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: gradlew NOT FOUND in repo"
            exit 1
          fi

          chmod +x "$GRADLEW_PATH"

      - name: Build Release APK
        run: |
          GRADLEW_PATH=$(find . -name gradlew -type f | head -n 1)
          "$GRADLEW_PATH" assembleRelease