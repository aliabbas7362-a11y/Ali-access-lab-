name: Verify Android Build Setup

on: [push, workflow_dispatch]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: List root files
        run: ls -la

      - name: Install dependencies
        run: npm install

      - name: Try adding Android platform
        run: |
          npm install @capacitor/android
          npx cap add android

      - name: List files after Android add
        run: ls -la
