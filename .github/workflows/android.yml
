name: Build Signed APK

on:
  push:
    branches:
      - Signed APK

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Make gradlew executable
        run: |
          cd android
          chmod +x gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease
