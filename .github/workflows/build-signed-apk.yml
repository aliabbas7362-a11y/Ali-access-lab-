name: Build Signed APK with Capacitor

on:
  push:
    branches: [ main, setup-signed-apk ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Add Capacitor and Android
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android --save

    - name: Initialize Capacitor
      run: |
        npx cap init Ali-Access-Lab com.aliabbas.accesslab --web-dir=. || true

    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore android/app/release.jks -keyalg RSA -keysize 2048 \
        -validity 10000 \
        -alias release-key \
        -storepass "aliabbas@2024" \
        -keypass "aliabbas@2024" \
        -dname "CN=Ali Abbas, OU=Development, O=Ali Access Lab, L=Pakistan, S=Punjab, C=PK" || true
        mkdir -p android/app
        keytool -genkey -v -keystore android/app/release.jks -keyalg RSA -keysize 2048 \
        -validity 10000 \
        -alias release-key \
        -storepass "aliabbas@2024" \
        -keypass "aliabbas@2024" \
        -dname "CN=Ali Abbas, OU=Development, O=Ali Access Lab, L=Pakistan, S=Punjab, C=PK"

    - name: Add Android Platform
      run: npx cap add android || true

    - name: Sync Capacitor
      run: npx cap sync

    - name: Build APK
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=app/release.jks \
          -Pandroid.injected.signing.store.password=aliabbas@2024 \
          -Pandroid.injected.signing.key.alias=release-key \
          -Pandroid.injected.signing.key.password=aliabbas@2024 || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: signed-apk
        path: android/app/build/outputs/apk/release/
        retention-days: 30

    - name: List Build Outputs
      run: |
        echo "Build outputs:"
        find android/app/build/outputs -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found"
