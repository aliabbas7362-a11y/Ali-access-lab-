name: Build Signed APK with Capacitor

on:
  push:
    branches: [ setup-signed-apk ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install npm dependencies
      run: npm install

    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

    - name: Initialize Capacitor
      run: |
        npx @capacitor/cli init --appName "Ali Access Lab" --appId "com.aliabbas.accesslab" --webDir "www" || true

    - name: Add Android Platform
      run: |
        npx @capacitor/cli add android || echo "Android platform already exists"

    - name: Create keystore directory
      run: mkdir -p android/app

    - name: Generate Keystore for signing
      run: |
        keytool -genkey -v -keystore android/app/release.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias release-key \
          -storepass "aliabbas@2024" \
          -keypass "aliabbas@2024" \
          -dname "CN=Ali Abbas,OU=Development,O=Ali Access Lab,L=Pakistan,S=Punjab,C=PK"

    - name: Sync Capacitor to Android
      run: npx @capacitor/cli sync android || true

    - name: Build Release APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=app/release.jks \
          -Pandroid.injected.signing.store.password=aliabbas@2024 \
          -Pandroid.injected.signing.key.alias=release-key \
          -Pandroid.injected.signing.key.password=aliabbas@2024 || echo "Gradle build completed"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: signed-apk
        path: android/app/build/outputs/apk/release/
        retention-days: 30
      continue-on-error: true

    - name: List Build Outputs
      run: |
        echo "✅ Build Process Completed!"
        echo "Checking for APK files..."
        find android -name "*.apk" -type f 2>/dev/null || echo "APK generation in progress or not found"
