name: Build Signed APK with Capacitor

on:
  push:
    branches: [ setup-signed-apk ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install npm dependencies
      run: npm install --legacy-peer-deps || npm install

    - name: Install Capacitor CLI globally
      run: npm install -g @capacitor/cli

    - name: Create capacitor.config.json
      run: |
        cat > capacitor.config.json << 'EOF'
        {
          "appId": "com.aliabbas.accesslab",
          "appName": "Ali Access Lab",
          "webDir": ".",
          "server": {
            "androidScheme": "https"
          },
          "plugins": {},
          "cordova": {}
        }
        EOF

    - name: Add Capacitor Android
      run: npx @capacitor/cli add android --web-dir=.

    - name: Create keystore directory
      run: mkdir -p android/app

    - name: Generate Keystore for signing
      run: |
        keytool -genkey -v -keystore android/app/release.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias release-key \
          -storepass "aliabbas@2024" \
          -keypass "aliabbas@2024" \
          -dname "CN=Ali Abbas,OU=Development,O=Ali Access Lab,L=Pakistan,S=Punjab,C=PK"

    - name: Build Release APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=app/release.jks \
          -Pandroid.injected.signing.store.password=aliabbas@2024 \
          -Pandroid.injected.signing.key.alias=release-key \
          -Pandroid.injected.signing.key.password=aliabbas@2024

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: signed-apk
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Display APK Location
      run: |
        echo "✅ APK Build Complete!"
        ls -lh android/app/build/outputs/apk/release/ || echo "No APK found"
