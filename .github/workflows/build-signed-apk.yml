name: Build APK with Capacitor

on:
  push:
    branches: [ setup-signed-apk ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout setup-signed-apk branch
      uses: actions/checkout@v4
      with:
        ref: setup-signed-apk

    - name: Fetch latest index.html from main branch
      run: |
        git fetch origin main
        git checkout origin/main -- index.html

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Write capacitor.config.json
      run: |
        cat > capacitor.config.json << 'EOF2'
        {
          "appId": "com.aliaccesslabs.cardgame",
          "appName": "Card Game",
          "webDir": ".",
          "server": {
            "url": "https://aliabbas7362-a11y.github.io/Ali-access-lab-/",
            "cleartext": false,
            "allowNavigation": [
              "accounts.google.com",
              "*.google.com",
              "*.firebaseapp.com",
              "card-game-a1e68.firebaseapp.com"
            ]
          }
        }
        EOF2

    - name: Install dependencies
      run: |
        npm install
        npm install @capacitor/local-notifications
        npm install @capacitor-community/text-to-speech

    - name: Add Android platform
      run: npx cap add android

    - name: Sync web assets to Android
      run: npx cap sync android

    - name: Add notification permission to AndroidManifest.xml
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
          sed -i '/<manifest /a\    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"
        fi
        cat "$MANIFEST"

    - name: Add TTS queries block to AndroidManifest.xml
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        if ! grep -q "TTS_SERVICE" "$MANIFEST"; then
          cat > /tmp/tts_block.xml << 'EOF'
            <queries>
                <intent>
                    <action android:name="android.intent.action.TTS_SERVICE" />
                </intent>
            </queries>
        EOF
          sed -i -e "/<manifest /r /tmp/tts_block.xml" "$MANIFEST"
        fi
        cat "$MANIFEST"

    - name: Build Debug APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk