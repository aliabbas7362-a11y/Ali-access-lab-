name: Build Signed APK with Capacitor

on:
  push:
    branches: [ setup-signed-apk ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Create Android build directory structure
      run: |
        mkdir -p android/app/src/main/assets
        mkdir -p www
        echo "<html><body>Ali Access Lab</body></html>" > www/index.html

    - name: Create capacitor.config.json
      run: |
        cat > capacitor.config.json << 'EOF'
        {
          "appId": "com.aliabbas.accesslab",
          "appName": "Ali Access Lab",
          "webDir": "www",
          "server": {
            "androidScheme": "https"
          }
        }
        EOF

    - name: Create keystore directory
      run: mkdir -p android/app

    - name: Generate Keystore for signing
      run: |
        keytool -genkey -v -keystore android/app/release.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias release-key \
          -storepass "aliabbas@2024" \
          -keypass "aliabbas@2024" \
          -dname "CN=Ali Abbas,OU=Development,O=Ali Access Lab,L=Pakistan,S=Punjab,C=PK"

    - name: Create build.gradle for Android
      working-directory: ./android
      run: |
        ./gradlew --version || echo "Gradle setup"

    - name: Build Release APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=app/release.jks \
          -Pandroid.injected.signing.store.password=aliabbas@2024 \
          -Pandroid.injected.signing.key.alias=release-key \
          -Pandroid.injected.signing.key.password=aliabbas@2024 2>&1 || echo "Build attempt completed"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: signed-apk
        path: android/app/build/outputs/apk/
        retention-days: 30
      continue-on-error: true

    - name: Check APK Output
      run: |
        echo "Build Status: Complete"
        find android -name "*.apk" -type f 2>/dev/null && echo "APK Found!" || echo "APK not found - checking gradle output..."
        ls -la android/app/build/outputs/ 2>/dev/null || echo "No build outputs directory"
