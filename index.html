<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Card Game</title>
  <!-- Firebase SDK (compat version — works with plain <script> tags, no build tools) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0f14;
      --felt:       #0d1a10;       /* deep green felt */
      --felt2:      #0f1f13;
      --surface:    #141c1a;
      --surface2:   #1a2420;
      --border:     #2a3830;
      --green:      #1b7a3e;
      --green-h:    #22974c;
      --red:        #c0392b;
      --gold:       #e8b84b;
      --gold-dim:   #9a7a30;
      --text:       #dce8dc;
      --text-muted: #6e8c72;
      --radius:     14px;
      --r-sm:       8px;
      --font:       'Georgia', 'Times New Roman', serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── LIVE REGIONS (TalkBack only) ── */
    .sr-only {
      position: absolute !important; width: 1px !important; height: 1px !important;
      padding: 0 !important; margin: -1px !important; overflow: hidden !important;
      clip: rect(0,0,0,0) !important; white-space: nowrap !important; border: 0 !important;
    }

    /* ── SKIP LINK ── */
    .skip-link {
      position: absolute; top: -999px; left: 0;
      background: var(--gold); color: #000;
      padding: 8px 16px; font-size: 14px; border-radius: 4px; z-index: 9999;
    }
    .skip-link:focus { top: 8px; }

    /* ═══════════════════════════════════════
       FULL-SCREEN APP SHELL
       ─────────────────────────────────────── */
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── SCREENS ── */
    .screen { display: none; }
    .screen.active { display: flex; }

    /* ─────────────────────────────────────────
       DASHBOARD SCREEN
       ───────────────────────────────────────── */
    #screen-home {
      position: fixed; inset: 0;
      flex-direction: column;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(27,122,62,0.14) 0%, transparent 65%),
        var(--bg);
      overflow: hidden;
    }

    /* ── DASHBOARD TOP BAR ── */
    .dash-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top, 0px));
      background: rgba(10,15,20,0.7);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* 3-dot button */
    .dash-more-btn {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer; color: var(--text-muted);
      font-size: 1.3rem; letter-spacing: 1px;
      transition: background 0.15s, color 0.15s;
    }
    .dash-more-btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
    .dash-more-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }

    /* App title center */
    .dash-app-title {
      font-size: 0.95rem; font-weight: bold;
      color: var(--gold); letter-spacing: 2px;
      text-transform: uppercase; pointer-events: none;
    }

    /* Profile button */
    .dash-profile-btn {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer; overflow: hidden;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }
    .dash-profile-btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
    .dash-profile-btn:hover { border-color: var(--gold-dim); }
    .dash-profile-btn.signed-in { border-color: var(--green); }

    .profile-avatar-img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    .profile-avatar-placeholder {
      font-size: 1.4rem; color: var(--text-muted); line-height: 1;
    }

    /* ── DASHBOARD SCROLLABLE BODY ── */
    .dash-body {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 24px 16px;
      padding-bottom: calc(24px + var(--safe-bottom));
    }

    /* Greeting */
    .dash-greeting {
      text-align: center; margin-bottom: 28px;
    }
    .dash-greeting-name {
      font-size: 1.1rem; color: var(--text); font-weight: bold;
    }
    .dash-greeting-sub {
      font-size: 0.78rem; color: var(--text-muted);
      margin-top: 4px; letter-spacing: 1px;
    }

    /* Section label */
    .dash-section-label {
      font-size: 0.68rem; color: var(--text-muted);
      letter-spacing: 2.5px; text-transform: uppercase;
      margin-bottom: 12px; padding-left: 2px;
    }

    /* Game grid */
    .dash-game-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .game-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 14px 16px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      transition: border-color 0.18s, transform 0.12s, box-shadow 0.18s;
      min-height: 110px;
    }
    .game-card:focus-visible {
      outline: 3px solid var(--gold); outline-offset: 2px;
      border-color: var(--gold);
    }
    .game-card:hover:not([aria-disabled="true"]) {
      border-color: var(--green-h);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .game-card[aria-disabled="true"] {
      opacity: 0.45; cursor: not-allowed;
    }
    .game-card-icon  { font-size: 2rem; line-height: 1; pointer-events: none; }
    .game-card-name  {
      font-size: 0.82rem; font-weight: bold;
      color: var(--text); text-align: center; pointer-events: none;
    }
    .game-card-badge {
      position: absolute; top: 8px; right: 8px;
      font-size: 0.6rem; font-weight: bold;
      background: var(--green); color: #fff;
      padding: 2px 6px; border-radius: 20px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .game-card-badge.soon {
      background: var(--surface2); color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* ── PROFILE PANEL (slide-in, same system as drawers) ── */
    .profile-panel-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--surface2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; margin: 0 auto 12px; overflow: hidden;
    }
    .profile-panel-avatar img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    .profile-panel-name {
      font-size: 1rem; font-weight: bold; color: var(--text);
      text-align: center; margin-bottom: 4px;
    }
    .profile-panel-email {
      font-size: 0.8rem; color: var(--text-muted);
      text-align: center; margin-bottom: 24px;
      word-break: break-all;
    }
    .btn-google-signin {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px 20px;
      background: #fff; color: #3c4043;
      border: 1px solid #dadce0; border-radius: var(--r-sm);
      font-family: 'Roboto', var(--font); font-size: 0.95rem; font-weight: 500;
      cursor: pointer; min-height: 52px;
      transition: box-shadow 0.15s, background 0.15s;
    }
    .btn-google-signin:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
    .btn-google-signin:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.3); background: #f8f8f8; }
    .btn-google-signin svg { flex-shrink: 0; }
    .btn-signout {
      width: 100%; padding: 12px; margin-top: 12px;
      background: transparent; border: 1px solid var(--border);
      color: var(--red); border-radius: var(--r-sm);
      font-family: var(--font); font-size: 0.9rem;
      cursor: pointer; min-height: 48px;
    }
    .btn-signout:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }

    /* ── MORE OPTIONS DIALOG ── */
    #more-options-dialog {
      position: fixed; inset: 0; z-index: 400;
      display: none; align-items: flex-end; justify-content: flex-start;
      padding: 0 0 24px 16px;
      padding-bottom: calc(24px + var(--safe-bottom));
    }
    #more-options-dialog.open { display: flex; }
    #more-options-dialog .dialog-scrim {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.6);
    }
    .more-options-menu {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    .more-options-item {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: 16px 18px;
      background: transparent; border: none;
      color: var(--text); font-family: var(--font); font-size: 0.95rem;
      cursor: pointer; text-align: left; min-height: 54px;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .more-options-item:last-child { border-bottom: none; }
    .more-options-item:hover { background: rgba(255,255,255,0.06); }
    .more-options-item:focus-visible { outline: 3px solid var(--gold); outline-offset: -2px; }
    .more-options-item .moi-icon { font-size: 1.1rem; width: 22px; text-align: center; }

    /* Notification bell */
    .dash-notif-btn {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer; color: var(--text-muted);
      font-size: 1.15rem;
      transition: background 0.15s, color 0.15s;
    }
    .dash-notif-btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
    .dash-notif-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .notif-badge {
      position: absolute; top: 6px; right: 6px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); display: none;
    }
    .notif-badge.visible { display: block; }

    /* Notification panel drawer body extras */
    .notif-empty {
      text-align: center; padding: 40px 20px;
      color: var(--text-muted); font-size: 0.88rem; line-height: 1.7;
    }
    .notif-empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    #screen-privacy {
      position: fixed; inset: 0;
      flex-direction: column;
      background: var(--bg);
    }
    .privacy-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top, 0px));
      background: rgba(10,15,20,0.7);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .privacy-title {
      font-size: 1rem; font-weight: bold; color: var(--gold);
    }
    .privacy-body {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      padding-bottom: calc(24px + var(--safe-bottom));
    }
    .privacy-body h2 {
      font-size: 0.9rem; color: var(--gold);
      margin: 20px 0 8px; letter-spacing: 1px;
    }
    .privacy-body h2:first-child { margin-top: 0; }
    .privacy-body p {
      font-size: 0.85rem; color: var(--text-muted);
      line-height: 1.7; margin-bottom: 12px;
    }

    /* ── RIPPLE BUTTON BASE ── */
    .btn {
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 17px 20px; border: none;
      border-radius: var(--radius);
      font-family: var(--font); font-size: 1.05rem; font-weight: bold;
      cursor: pointer; min-height: 58px;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }
    .btn:active { transform: scale(0.97); }
    .btn .icon { font-size: 1.2rem; pointer-events: none; }

    /* Ripple effect */
    .btn::after {
      content: '';
      position: absolute; border-radius: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.18);
      transform: translate(-50%,-50%) scale(0);
      opacity: 0;
      pointer-events: none;
    }
    .btn.rippling::after {
      animation: ripple-out 0.45s ease-out forwards;
    }
    @keyframes ripple-out {
      to { width: 500px; height: 500px; opacity: 0; transform: translate(-50%,-50%) scale(1); }
    }

    .btn-play { background: var(--green); color: #fff; font-size: 1.1rem; }
    .btn-play:hover { filter: brightness(1.15); }

    .btn-outline {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      font-size: 0.95rem;
    }
    .btn-outline:hover { color: var(--text); border-color: var(--text-muted); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 2px 0; }

    /* ── TOGGLE SWITCHES (shared by settings drawer) ── */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .toggle-label { font-size: 0.95rem; color: var(--text); }
    .toggle-desc  { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
    .toggle-switch { position: relative; width: 52px; height: 28px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .slider {
      position: absolute; inset: 0;
      background: var(--border); border-radius: 28px; cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 20px; height: 20px; left: 4px; top: 4px;
      background: #fff; border-radius: 50%; transition: transform 0.2s;
    }
    .toggle-switch input:checked + .slider { background: var(--green); }
    .toggle-switch input:checked + .slider::before { transform: translateX(24px); }
    .toggle-switch input:focus-visible + .slider { outline: 3px solid var(--gold); outline-offset: 2px; }

    footer {
      margin-top: 24px; font-size: 0.72rem; color: var(--text-muted);
      text-align: center; pointer-events: none; max-width: 400px; width: 100%;
    }

    /* ═══════════════════════════════════════════
       SLIDE-IN DRAWER — used for Settings, Score, History
       Slides in from the RIGHT edge, covers full screen.
       Triggered by .open class.
       ─────────────────────────────────────────── */
    .slide-drawer {
      position: fixed; inset: 0;
      z-index: 300;
      pointer-events: none;   /* invisible by default — scrim + panel both off */
    }

    /* dark scrim behind the panel */
    .slide-drawer__scrim {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.72);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    /* the actual sliding panel */
    .slide-drawer__panel {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: min(88vw, 360px);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      /* safe-area padding for notches */
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* OPEN STATE */
    .slide-drawer.open {
      pointer-events: auto;
    }
    .slide-drawer.open .slide-drawer__scrim {
      opacity: 1;
    }
    .slide-drawer.open .slide-drawer__panel {
      transform: translateX(0);
    }

    /* Drawer top bar — Back button + title */
    .drawer-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: rgba(10,15,20,0.7);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; min-width: 44px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.1rem;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .drawer-back-btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
    .drawer-back-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .drawer-back-btn:active { background: rgba(255,255,255,0.14); }

    .drawer-title {
      font-size: 1.05rem; font-weight: bold; color: var(--gold);
      letter-spacing: 0.5px;
    }

    /* Drawer scrollable body */
    .drawer-body {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 24px 20px;
    }

    /* shared section heading inside drawers */
    .drawer-section-heading {
      font-size: 0.7rem; color: var(--text-muted);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* panel rows (score / history entries) */
    .panel-row {
      display: flex; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 0.92rem; color: var(--text);
    }
    .panel-row:last-child { border-bottom: none; }

    /* ─────────────────────────────────────────
       SHUFFLE SCREEN
       ───────────────────────────────────────── */
    #shuffle-screen {
      display: none; position: fixed; inset: 0;
      background: var(--bg); z-index: 100;
      flex-direction: column;
    }
    #shuffle-screen.active { display: flex; }

    .shuffle-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top, 0px));
      background: rgba(10,15,20,0.85);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .shuffle-topbar-title {
      font-size: 1rem; font-weight: bold; color: var(--gold);
      letter-spacing: 1px;
    }

    .shuffle-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; gap: 28px; text-align: center;
    }

    .shuffle-icon { font-size: 4rem; line-height: 1; }

    .shuffle-title {
      font-size: 1.4rem; font-weight: bold; color: var(--text);
    }
    .shuffle-desc {
      font-size: 0.88rem; color: var(--text-muted);
      max-width: 280px; line-height: 1.7;
    }
    .btn-shuffle {
      background: var(--green); color: #fff; border: none;
      border-radius: var(--radius); padding: 18px 36px;
      font-family: var(--font); font-size: 1.05rem; font-weight: bold;
      cursor: pointer; min-height: 58px; min-width: 220px;
      box-shadow: 0 4px 16px rgba(27,122,62,0.4);
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-shuffle:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }
    .btn-shuffle:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-shuffle:active { transform: translateY(0); }

    /* ─────────────────────────────────────────
       GAME SCREEN — FULL-SCREEN FELT TABLE
       ───────────────────────────────────────── */
    #screen-game {
      position: fixed; inset: 0;
      flex-direction: column;
      background:
        radial-gradient(ellipse 100% 70% at 50% 40%, rgba(15,35,18,0.9) 0%,
