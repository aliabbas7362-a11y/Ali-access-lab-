name: Build APK with Capacitor

on:
  push:
    branches: [ setup-signed-apk ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout setup-signed-apk branch
      uses: actions/checkout@v4
      with:
        ref: setup-signed-apk

    - name: Fetch latest index.html from main branch
      run: |
        git fetch origin main
        git checkout origin/main -- index.html
        echo "index.html fetched from main branch"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Write package.json
      run: |
        cat > package.json << 'EOF'
        {
          "name": "ali-access-lab",
          "version": "1.0.0",
          "description": "Ali Access Lab - Game Depot APK",
          "main": "index.html",
          "scripts": {
            "build": "echo 'Web build complete'"
          },
          "dependencies": {
            "@capacitor/core": "latest",
            "@capacitor/android": "latest",
            "@codetrix-studio/capacitor-google-auth": "latest"
          },
          "devDependencies": {
            "@capacitor/cli": "latest"
          }
        }
        EOF

    - name: Write capacitor.config.json
      run: |
        cat > capacitor.config.json << 'EOF'
        {
          "appId": "com.aliabbas.courtpiece",
          "appName": "Card Game",
          "webDir": "www",
          "server": {
            "androidScheme": "https",
            "url": "https://aliabbas7362-a11y.github.io/Ali-access-lab-/",
            "cleartext": false,
            "allowNavigation": [
              "accounts.google.com",
              "*.google.com",
              "*.firebaseapp.com",
              "card-game-a1e68.firebaseapp.com"
            ]
          },
          "plugins": {
            "GoogleAuth": {
              "scopes": ["profile", "email"],
              "serverClientId": "495670908374-plt4l2dsp5s9fqu2pvjg08orci7d4ugl.apps.googleusercontent.com",
              "forceCodeForRefreshToken": true
            }
          }
        }
        EOF

    - name: Prepare web assets
      run: |
        mkdir -p www
        cp index.html www/
        cp -r sounds www/ 2>/dev/null || true

    - name: Install dependencies
      run: npm install

    - name: Add Android platform
      run: npx cap add android

    - name: Sync web assets to Android
      run: npx cap sync android

    - name: Build Debug APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
